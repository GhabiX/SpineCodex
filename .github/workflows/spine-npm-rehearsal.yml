name: spine-npm-rehearsal

on:
  push:
    branches:
      - "spine-npm-rehearsal-*"
    paths:
      - ".github/workflows/spine-npm-rehearsal.yml"
      - "codex-cli/**"
      - "codex-rs/**"
      - "scripts/stage_npm_packages.py"
  pull_request:
    paths:
      - ".github/workflows/spine-npm-rehearsal.yml"
      - "codex-cli/**"
      - "codex-rs/**"
      - "scripts/stage_npm_packages.py"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to write into staged npm packages."
        required: true
        type: string
        default: "0.1.0-rehearsal.0"

concurrency:
  group: spine-npm-rehearsal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: codex-rs
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runs_on: ubuntu-24.04
            artifact_name: x86_64-unknown-linux-musl
            binaries: "codex"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Linux bwrap build dependencies
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      - name: Install UBSan runtime (musl)
        if: ${{ contains(matrix.target, 'linux') }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libubsan1

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}

      - name: Use hermetic Cargo home (musl)
        if: ${{ contains(matrix.target, 'linux') }}
        shell: bash
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - name: Install Zig
        if: ${{ contains(matrix.target, 'linux') }}
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.14.0
          use-cache: false

      - name: Install musl build tools
        if: ${{ contains(matrix.target, 'linux') }}
        env:
          TARGET: ${{ matrix.target }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - name: Configure rustc UBSan wrapper (musl host)
        if: ${{ contains(matrix.target, 'linux') }}
        shell: bash
        run: |
          set -euo pipefail
          ubsan=""
          if command -v ldconfig >/dev/null 2>&1; then
            ubsan="$(ldconfig -p | grep -m1 'libubsan\.so\.1' | sed -E 's/.*=> (.*)$/\1/')"
          fi
          wrapper_root="${RUNNER_TEMP:-/tmp}"
          wrapper="${wrapper_root}/rustc-ubsan-wrapper"
          cat > "${wrapper}" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ -n "${ubsan}" ]]; then
            export LD_PRELOAD="${ubsan}\${LD_PRELOAD:+:\${LD_PRELOAD}}"
          fi
          exec "\$1" "\${@:2}"
          EOF
          chmod +x "${wrapper}"
          echo "RUSTC_WRAPPER=${wrapper}" >> "$GITHUB_ENV"
          echo "RUSTC_WORKSPACE_WRAPPER=" >> "$GITHUB_ENV"

      - name: Clear sanitizer flags (musl)
        if: ${{ contains(matrix.target, 'linux') }}
        shell: bash
        run: |
          set -euo pipefail
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"
          target_no_jitter="AWS_LC_SYS_NO_JITTER_ENTROPY_${{ matrix.target }}"
          target_no_jitter="${target_no_jitter//-/_}"
          echo "${target_no_jitter}=1" >> "$GITHUB_ENV"
          echo "RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_ENCODED_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "RUSTDOCFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"

      - name: Configure musl rusty_v8 artifact overrides and verify checksums
        if: ${{ contains(matrix.target, 'linux') }}
        uses: ./.github/actions/setup-rusty-v8-musl
        with:
          target: ${{ matrix.target }}

      - name: Build bwrap
        if: ${{ contains(matrix.target, 'linux') }}
        shell: bash
        run: cargo build --target "${{ matrix.target }}" --release --timings --bin bwrap

      - name: Cargo build
        shell: bash
        env:
          CARGO_BUILD_JOBS: "4"
        run: |
          set -euo pipefail
          build_args=()
          for binary in ${{ matrix.binaries }}; do
            build_args+=(--bin "$binary")
          done
          cargo build -p codex-cli --target "${{ matrix.target }}" --release --timings "${build_args[@]}"

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          dest="dist/${{ matrix.target }}"
          mkdir -p "$dest"

          for binary in ${{ matrix.binaries }}; do
            source="target/${{ matrix.target }}/release/${binary}"
            if [[ ! -f "$source" ]]; then
              echo "Missing build output: $source"
              exit 1
            fi
            cp "$source" "$dest/${binary}-${{ matrix.target }}"
          done

          if [[ "${{ matrix.target }}" == *linux* ]]; then
            source="target/${{ matrix.target }}/release/bwrap"
            if [[ ! -f "$source" ]]; then
              echo "Missing build output: $source"
              exit 1
            fi
            cp "$source" "$dest/bwrap-${{ matrix.target }}"
          fi

      - name: Compress artifacts
        shell: bash
        run: |
          set -euo pipefail
          dest="dist/${{ matrix.target }}"
          for f in "$dest"/*; do
            base="$(basename "$f")"
            if [[ "$base" == *.zst ]]; then
              continue
            fi
            zstd -T0 -19 -f -o "$f.zst" "$f"
          done

      - name: Upload native artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.artifact_name }}
          path: codex-rs/dist/${{ matrix.target }}/*.zst
          if-no-files-found: error

  package:
    name: Stage npm tarballs
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: facebook/install-dotslash@1e4e7b3e07eaca387acb98f1d4720e0bee8dbb6a # v2

      - name: Stage npm packages
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version || '0.1.0-rehearsal.0' }}
        run: |
          set -euo pipefail
          workflow_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          packages=(codex-root codex-linux-x64)

          cmd=(
            ./scripts/stage_npm_packages.py
            --release-version "$RELEASE_VERSION"
            --workflow-url "$workflow_url"
            --github-repo "$GITHUB_REPOSITORY"
            --output-dir dist/npm
          )
          for package in "${packages[@]}"; do
            cmd+=(--package "$package")
          done
          "${cmd[@]}"
      - name: List staged npm tarballs
        run: ls -lh dist/npm

      - name: Upload npm tarballs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: spine-codex-npm-tarballs
          path: dist/npm/*.tgz
          if-no-files-found: error
