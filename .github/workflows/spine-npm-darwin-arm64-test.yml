name: spine-npm-darwin-arm64-test

on:
  push:
    branches:
      - "spine-npm-darwin-arm64-test-*"
    paths:
      - ".github/workflows/spine-npm-darwin-arm64-test.yml"
      - "codex-cli/**"
      - "codex-rs/**"
      - "scripts/stage_npm_packages.py"
  workflow_dispatch:
    inputs:
      version:
        description: "Prerelease version to stage, without the platform suffix."
        required: true
        type: string
        default: "0.131.0-alpha.1"
      runner_label:
        description: "macOS arm64 runner label."
        required: true
        type: string
        default: "macos-15"

concurrency:
  group: spine-npm-darwin-arm64-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-darwin-arm64:
    name: Build aarch64-apple-darwin codex
    runs-on: ${{ inputs.runner_label || 'macos-15' }}
    timeout-minutes: 240
    permissions:
      contents: read
    env:
      CARGO_PROFILE_RELEASE_LTO: thin
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      CARGO_NET_RETRY: "10"
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Print runner specs
        shell: bash
        run: |
          set -euo pipefail
          echo "OS: $(sw_vers -productName) $(sw_vers -productVersion)"
          echo "Hardware model: $(sysctl -n hw.model)"
          echo "CPU architecture: $(uname -m)"
          echo "Logical CPUs: $(sysctl -n hw.logicalcpu)"
          echo "Total RAM: $(sysctl -n hw.memsize | awk '{printf \"%.1f GiB\\n\", $1 / 1024 / 1024 / 1024}')"
          df -h .

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: aarch64-apple-darwin

      - name: Install zstd if missing
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v zstd >/dev/null 2>&1; then
            brew install zstd
          fi

      - name: Cargo build
        shell: bash
        run: |
          set -euo pipefail
          echo "CARGO_PROFILE_RELEASE_LTO=${CARGO_PROFILE_RELEASE_LTO}"
          cargo build --target aarch64-apple-darwin --release --timings --bin codex

      - name: Stage native artifact
        shell: bash
        run: |
          set -euo pipefail
          target="aarch64-apple-darwin"
          dest="dist/${target}"
          mkdir -p "$dest"
          cp "target/${target}/release/codex" "$dest/codex-${target}"
          zstd -T0 -19 -f -o "$dest/codex-${target}.zst" "$dest/codex-${target}"

      - name: Upload native artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: aarch64-apple-darwin
          path: codex-rs/dist/aarch64-apple-darwin/codex-aarch64-apple-darwin.zst
          if-no-files-found: error

  package:
    name: Stage npm tarballs
    needs: build-darwin-arm64
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: facebook/install-dotslash@1e4e7b3e07eaca387acb98f1d4720e0bee8dbb6a # v2

      - name: Stage root and darwin-arm64 packages
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version || '0.131.0-alpha.1' }}
        run: |
          set -euo pipefail
          workflow_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          ./scripts/stage_npm_packages.py \
            --release-version "$RELEASE_VERSION" \
            --workflow-url "$workflow_url" \
            --github-repo "$GITHUB_REPOSITORY" \
            --output-dir dist/npm \
            --package codex-root \
            --package codex-darwin-arm64

      - name: Inspect staged package metadata
        env:
          RELEASE_VERSION: ${{ inputs.version || '0.131.0-alpha.1' }}
        run: |
          set -euo pipefail
          mkdir -p dist/inspect/root dist/inspect/darwin-arm64
          tar -xzf "dist/npm/codex-npm-${RELEASE_VERSION}.tgz" -C dist/inspect/root package/package.json
          tar -xzf "dist/npm/codex-npm-darwin-arm64-${RELEASE_VERSION}.tgz" -C dist/inspect/darwin-arm64 package/package.json
          node -e '
            const fs = require("fs");
            const version = process.env.RELEASE_VERSION;
            const root = JSON.parse(fs.readFileSync("dist/inspect/root/package/package.json", "utf8"));
            const platform = JSON.parse(fs.readFileSync("dist/inspect/darwin-arm64/package/package.json", "utf8"));
            const deps = root.optionalDependencies || {};
            const expectedAlias = "@spinejit/spine-codex-darwin-arm64";
            const expectedSpec = `npm:@spinejit/spine-codex@${version}-darwin-arm64`;
            if (root.name !== "@spinejit/spine-codex") throw new Error(`bad root name ${root.name}`);
            if (root.version !== version) throw new Error(`bad root version ${root.version}`);
            if (root.bin?.["spine-codex"] !== "bin/codex.js") throw new Error("bad bin mapping");
            if (Object.keys(deps).length !== 1 || deps[expectedAlias] !== expectedSpec) {
              throw new Error(`bad optionalDependencies ${JSON.stringify(deps)}`);
            }
            if (platform.name !== "@spinejit/spine-codex") throw new Error(`bad platform name ${platform.name}`);
            if (platform.version !== `${version}-darwin-arm64`) throw new Error(`bad platform version ${platform.version}`);
            if (JSON.stringify(platform.os) !== JSON.stringify(["darwin"])) throw new Error(`bad os ${JSON.stringify(platform.os)}`);
            if (JSON.stringify(platform.cpu) !== JSON.stringify(["arm64"])) throw new Error(`bad cpu ${JSON.stringify(platform.cpu)}`);
          '

      - name: List staged npm tarballs
        run: ls -lh dist/npm

      - name: Upload npm tarballs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: spine-codex-darwin-arm64-npm-tarballs
          path: dist/npm/*.tgz
          if-no-files-found: error

  smoke-macos-arm64:
    name: Smoke install on macOS arm64
    needs: package
    runs-on: ${{ inputs.runner_label || 'macos-15' }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Download npm tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: spine-codex-darwin-arm64-npm-tarballs
          path: dist/npm

      - name: Clean-prefix install and launch
        env:
          RELEASE_VERSION: ${{ inputs.version || '0.131.0-alpha.1' }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(uname -m)" = "arm64"
          prefix="${RUNNER_TEMP}/spine-codex-prefix"
          root_tgz="${PWD}/dist/npm/codex-npm-${RELEASE_VERSION}.tgz"
          platform_tgz="${PWD}/dist/npm/codex-npm-darwin-arm64-${RELEASE_VERSION}.tgz"

          npm install -g --prefix "$prefix" --omit=optional "$root_tgz"
          npm install -g --prefix "$prefix" \
            "@spinejit/spine-codex-darwin-arm64@file:${platform_tgz}"

          "$prefix/bin/spine-codex" --version
          "$prefix/bin/spine-codex" --help
